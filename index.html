<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit Karkera Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0F1219;
  color:#F1F5F9;
  font-family:'Inter',sans-serif;
}

.wrapper {
  max-width:900px;
  margin:auto;
  padding:40px;
}

h1 {
  font-family:'Syne',sans-serif;
  font-size:42px;
}

.card {
  background:#161C27;
  padding:20px;
  margin:20px 0;
  cursor:pointer;
  border:1px solid #252D3D;
}

.card:hover {
  background:#1C2333;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.open {
  display:flex;
}

.modal-box {
  background:#161C27;
  padding:20px;
  width:90%;
  max-width:900px;
  max-height:90vh;
  overflow:auto;
}

.controls {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

button {
  background:#3B82F6;
  border:none;
  color:white;
  padding:6px 12px;
  cursor:pointer;
}

input {
  width:60px;
}
</style>
</head>

<body>

<div class="wrapper">
  <h1>Rohit Karkera</h1>
  <p>Influencer Marketing Portfolio</p>

  <div class="card" onclick="openPDF(0)">boAt Campaign</div>
  <div class="card" onclick="openPDF(1)">PUBG Creator Brief</div>
  <div class="card" onclick="openPDF(2)">Free Fire Report</div>
  <div class="card" onclick="openPDF(3)">Supercell Pitch</div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">

    <div class="controls">
      <button onclick="zoomOut()">−</button>
      <button onclick="zoomIn()">+</button>
      <input id="pageInput" type="number" placeholder="Page">
      <button onclick="goToPage()">Go</button>
      <button onclick="closeModal()">Close</button>
    </div>

    <div id="viewer">Loading...</div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const pdfs = [
  "files/boAt_PlugInLevelUp_Campaign.pdf",
  "files/01_Creator_Brief_PUBGMOBILE.pdf",
  "files/02_Campaign_Report_FreeFire.pdf",
  "files/03_Launch_Pitch_Supercell.pdf"
];

let pdfDoc = null;
let currentPage = 1;
let scale = 1.2;

function openPDF(i){
  document.getElementById('modal').classList.add('open');
  loadPDF(pdfs[i]);
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('viewer').innerHTML="";
}

function loadPDF(url){
  document.getElementById('viewer').innerHTML="Loading...";
  pdfjsLib.getDocument(url).promise.then(pdf=>{
    pdfDoc = pdf;
    currentPage = 1;
    renderPage(currentPage);
  });
}

function renderPage(num){
  pdfDoc.getPage(num).then(page=>{
    const viewport = page.getViewport({scale});
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    document.getElementById('viewer').innerHTML="";
    document.getElementById('viewer').appendChild(canvas);

    page.render({canvasContext:ctx, viewport});
  });
}

function zoomIn(){
  scale += 0.2;
  renderPage(currentPage);
}

function zoomOut(){
  if(scale > 0.6){
    scale -= 0.2;
    renderPage(currentPage);
  }
}

function goToPage(){
  const p = parseInt(document.getElementById('pageInput').value);
  if(p && p <= pdfDoc.numPages){
    currentPage = p;
    renderPage(p);
  }
}
</script>

</body>
</html>
